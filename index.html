<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Interativo AFP — Edição 2026</title>
    <style>
        :root { --bg-color: #121214; --card-bg: #1a1a1e; --text-color: #e1e1e6; --accent-color: #ff6b00; --correct-color: #04d361; --wrong-color: #f75a68; --border-color: #29292e; --bizu-bg: #121214; }
        [data-theme="light"] { --bg-color: #f4f4f9; --card-bg: #ffffff; --text-color: #202024; --border-color: #d1d1d6; --bizu-bg: #e8e8ed; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; line-height: 1.6; padding-bottom: 60px; transition: 0.3s; }
        header { background: linear-gradient(135deg, #000000 0%, #1a1a1e 100%); border-bottom: 3px solid var(--accent-color); padding: 30px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: relative; }
        header h1 { font-size: 2.2rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin-bottom: 10px; }
        header h1 span { color: var(--accent-color); }
        header p { color: #a8a8b3; font-size: 1.1rem; }
        .theme-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; padding: 5px 15px; background: var(--accent-color); border: none; border-radius: 4px; color: #fff; font-weight: bold; }
        .dashboard { position: sticky; top: 0; z-index: 100; background-color: var(--card-bg); border-bottom: 2px solid var(--border-color); padding: 15px 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .dash-container { max-width: 850px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .dash-timer-wrapper { display: flex; align-items: center; gap: 10px; }
        .dash-item { font-size: 0.95rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .dash-item span { font-size: 1.2rem; margin-left: 5px; }
        #dash-progress { color: var(--accent-color); } #dash-correct { color: var(--correct-color); } #dash-wrong { color: var(--wrong-color); } #dash-pct { color: var(--accent-color); } #dash-timer { color: var(--text-color); font-variant-numeric: tabular-nums; }
        .btn-dash { background-color: transparent; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; padding: 6px 12px; transition: all 0.2s; }
        .btn-toggle-timer { border: 1px solid var(--accent-color); color: var(--accent-color); }
        .btn-toggle-timer:hover { background-color: var(--accent-color); color: #fff; }
        .btn-reset { border: 1px solid var(--wrong-color); color: var(--wrong-color); }
        .btn-reset:hover { background-color: var(--wrong-color); color: #fff; }
        .container { max-width: 850px; margin: 20px auto; padding: 0 20px; }
        .quest-card { position: relative; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .quest-card.paused-mode { opacity: 0.5; }
        .quest-card:hover { border-color: var(--accent-color); }
        .quest-header { font-weight: bold; color: var(--accent-color); margin-bottom: 12px; font-size: 1.1rem; text-transform: uppercase; }
        .quest-text { font-size: 1.1rem; margin-bottom: 20px; color: var(--text-color); text-align: justify; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 15px; }
        .btn-opt { flex: 1; background-color: #202024; border: 2px solid var(--border-color); color: #fff; padding: 12px; font-size: 1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s ease; }
        .btn-opt:hover:not(.disabled) { background-color: #29292e; border-color: #7c7c8a; }
        .btn-opt.selected-correct { background-color: var(--correct-color) !important; border-color: var(--correct-color) !important; color: #000 !important; }
        .btn-opt.selected-wrong { background-color: var(--wrong-color) !important; border-color: var(--wrong-color) !important; color: #fff !important; }
        .btn-opt.disabled { opacity: 0.4; cursor: not-allowed; }
        .bizu-box { display: none; background-color: var(--bizu-bg); border-left: 4px solid var(--accent-color); padding: 20px; margin-top: 15px; border-radius: 0 4px 4px 0; font-size: 0.95rem; text-align: justify; animation: fadeIn 0.4s ease forwards; }
        .bizu-box strong { color: var(--accent-color); }
        .tab-content { margin-top: 10px; }
        .btn-close-bizu { display: block; margin-top: 15px; background: transparent; border: 1px solid #7c7c8a; color: var(--text-color); padding: 5px 10px; cursor: pointer; font-size: 0.8rem; border-radius: 4px; transition: 0.2s; }
        .btn-close-bizu:hover { background: #323238; color: #fff; }
        /* Ajuste do gatilho de reabertura */
        .btn-reopen-trigger { display: flex; align-items: center; justify-content: center; margin-top: 10px; cursor: pointer; color: var(--accent-color); font-size: 0.85rem; font-weight: bold; text-transform: uppercase; gap: 5px; opacity: 0.8; }
        .btn-reopen-trigger:hover { opacity: 1; }
        .tab-btn { background: #323238; color: #fff; border: none; padding: 5px 10px; cursor: pointer; margin-right: 5px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .status-tag { font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 10px; font-size: 1.1rem; }
        .status-correct { color: var(--correct-color); } .status-wrong { color: var(--wrong-color); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; padding: 20px; text-align: center; }
        .modal-content { background: var(--card-bg); border: 2px solid var(--accent-color); padding: 40px; border-radius: 10px; max-width: 600px; }
        .modal-content h2 { color: var(--accent-color); font-size: 2.5rem; margin-bottom: 20px; }
        .modal-content p { font-size: 1.5rem; color: var(--text-color); margin-bottom: 30px; }
        .modal-content strong { display: block; font-size: 1.2rem; color: var(--text-color); font-style: italic; margin-top: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; padding: 40px 20px; color: #7c7c8a; font-size: 0.9rem; border-top: 1px solid var(--border-color); margin-top: 60px; }
    </style>
</head>
<body>

<header>
    <h1>MÉTODO <span>AFP</span> — ANTES FEITO QUE PERFEITO</h1>
    <p>DIREITO CIVIL</p>
    <button class="theme-btn" onclick="toggleTheme()">☀ / 🌙</button>
</header>
<div class="dashboard">
    <div class="dash-container">
        <div class="dash-timer-wrapper">
            <div class="dash-item">Tempo: <span id="dash-timer">00:00:00</span></div>
            <button id="btn-timer-control" class="btn-dash btn-toggle-timer" onclick="toggleTimer()">Iniciar</button>
        </div>
        <div class="dash-item">Respondidas: <span id="dash-progress">0/0</span></div>
        <div class="dash-item">Acertos: <span id="dash-correct">0</span></div>
        <div class="dash-item">Erros: <span id="dash-wrong">0</span></div>
        <div class="dash-item">Aproveitamento: <span id="dash-pct">0%</span></div>
        <button class="btn-dash btn-reset" onclick="resetSimulado()">Reiniciar Prova</button>
    </div>
</div>
<div class="container" id="quiz-container"></div>
<footer>&copy; 2026 Método AFP - "Não sabia que era impossível, foi lá e fez".</footer>

<script src="dados.js"></script>
<script>
    function toggleTheme() {
        const d = document.body;
        const theme = d.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        d.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }
    if(localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');

    let rawData = [];
    if (typeof bancoQuestoes !== 'undefined') { rawData = bancoQuestoes; } else {
        const list1 = typeof questoesCP !== 'undefined' ? questoesCP : [];
        const list2 = typeof questoesCP_Parte2 !== 'undefined' ? questoesCP_Parte2 : [];
        rawData = [...list1, ...list2];
    }
    const questions = rawData.filter(q => q && (q.id || q.id === 0)).map(q => ({ id: q.id, text: q.enunciado || q.text, gab: (q.gabarito || q.gab).charAt(0).toUpperCase(), bizu: q.justificativa || q.bizu, lei: q.lei, juris: q.jurisprudencia || q.juris || null })).sort((a,b) => a.id - b.id);
    let userProgress = JSON.parse(localStorage.getItem('afp_simulado_progress')) || {};
    let isTimerRunning = localStorage.getItem('afp_simulado_running') === 'true'; 
    let totalSegundos = parseInt(localStorage.getItem('afp_simulado_time')) || 0;
    let timerInterval;
    const container = document.getElementById('quiz-container');

    function renderQuiz() {
        container.innerHTML = "";
        questions.forEach((q) => {
            const card = document.createElement('div');
            card.className = 'quest-card';
            card.id = `quest-${q.id}`;
            card.innerHTML = `<div class="quest-header">Questão ${q.id}</div><div class="quest-text">${q.text}</div><div class="btn-group"><button class="btn-opt" data-opt="C" onclick="checkAnswer(${q.id}, 'C')">Certo</button><button class="btn-opt" data-opt="E" onclick="checkAnswer(${q.id}, 'E')">Errado</button></div><div class="bizu-box" id="bizu-${q.id}"></div>`;
            container.appendChild(card);
            if (userProgress[q.id]) restoreAnswer(q.id, userProgress[q.id]);
        });
        applyVisualPauseState();
        updateDashboard();
    }

    function scrollToNext(currentId) {
        const currentIndex = questions.findIndex(q => q.id === currentId);
        if (currentIndex !== -1 && currentIndex < questions.length - 1) {
            const nextId = questions[currentIndex + 1].id;
            const nextElement = document.getElementById(`quest-${nextId}`);
            if (nextElement) nextElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function restoreAnswer(id, choice) {
        const q = questions.find(item => item.id === id);
        const card = document.getElementById(`quest-${id}`);
        if (!card) return;
        const buttons = card.querySelectorAll('.btn-opt');
        const bizuBox = document.getElementById(`bizu-${id}`);
        buttons.forEach(btn => { btn.classList.add('disabled'); btn.removeAttribute('onclick'); });
        let isCorrect = choice === q.gab;
        buttons.forEach(btn => { if (btn.getAttribute('data-opt') === choice) btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong'); });
        const btnTab = (label, target) => `<button class="tab-btn" onclick="this.parentElement.parentElement.querySelectorAll('.tab-content').forEach(c=>c.style.display='none'); document.getElementById('${target}').style.display='block';">${label}</button>`;
        bizuBox.innerHTML = `${isCorrect ? '<span class="status-tag status-correct">✔ QUESTÃO CONCLUÍDA — VOCÊ ACERTOU!</span>' : '<span class="status-tag status-wrong">❌ ERRO DETECTADO! (Gabarito: '+q.gab+')</span>'} <div style="margin-bottom:10px;">${btnTab('Justificativa', 'j-'+id)}${btnTab('Lei', 'l-'+id)}${q.juris ? btnTab('Juris', 's-'+id) : ''}</div><div id="j-${id}" class="tab-content" style="display:block;"><strong>Justificativa:</strong> ${q.bizu}</div><div id="l-${id}" class="tab-content" style="display:none;"><strong>Lei:</strong> ${q.lei}</div>${q.juris ? `<div id="s-${id}" class="tab-content" style="display:none;"><strong>Jurisprudência:</strong> ${q.juris}</div>` : ''}<button class="btn-close-bizu" onclick="this.parentElement.style.display = 'none'; document.getElementById('btn-reopen-${id}').style.display = 'flex'; scrollToNext(${id})">Fechar e ir para próxima</button>`;
        bizuBox.style.display = 'block';

        if (!document.getElementById(`btn-reopen-${id}`)) {
            const btnReopen = document.createElement('div');
            btnReopen.id = `btn-reopen-${id}`;
            btnReopen.className = 'btn-reopen-trigger';
            btnReopen.innerHTML = 'Mostrar mais ∨'; // Texto + ícone que você pediu
            btnReopen.style.display = 'none';
            btnReopen.onclick = function() { bizuBox.style.display = 'block'; this.style.display = 'none'; };
            card.appendChild(btnReopen);
        }
    }

    function checkAnswer(id, choice) { 
        if (!isTimerRunning) return alert("Pausado! Ative o cronômetro."); 
        userProgress[id] = choice; 
        localStorage.setItem('afp_simulado_progress', JSON.stringify(userProgress)); 
        restoreAnswer(id, choice); 
        updateDashboard(); 
        if (Object.keys(userProgress).length === questions.length) {
            isTimerRunning = false;
            localStorage.setItem('afp_simulado_running', 'false');
            handleTimerState();
            let totalAcertos = questions.filter(q => userProgress[q.id] === q.gab).length;
            let pct = (totalAcertos / questions.length) * 100;
            let msg = pct >= 80 ? "Parabéns, excelente desempenho! Você está no caminho certo para a aprovação." : "Não desanime! Cada erro é uma oportunidade de aprender e fortalecer seu conhecimento.";
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-content"><h2>SIMULADO CONCLUÍDO</h2><p>Aproveitamento: ${pct.toFixed(1)}%</p><p style="font-size: 1.1rem; color: #ff6b00;">${msg}</p><strong>"ELE NÃO SABIA QUE ERA IMPOSSÍVEL, FOI LÁ E FEZ"</strong><button class="btn-dash" style="margin-top:30px; border:1px solid #fff; color:#fff; padding: 10px 20px;" onclick="location.reload()">Recomeçar</button></div>`;
            document.body.appendChild(modal);
        }
    }

    function updateDashboard() { let keys = Object.keys(userProgress); let totalRespondidas = keys.length; let totalAcertos = questions.filter(q => userProgress[q.id] === q.gab).length; document.getElementById('dash-progress').innerText = `${totalRespondidas}/${questions.length}`; document.getElementById('dash-correct').innerText = totalAcertos; document.getElementById('dash-wrong').innerText = totalRespondidas - totalAcertos; document.getElementById('dash-pct').innerText = totalRespondidas > 0 ? ((totalAcertos / totalRespondidas) * 100).toFixed(1) + "%" : "0%"; }
    function handleTimerState() { clearInterval(timerInterval); if (isTimerRunning) { timerInterval = setInterval(() => { totalSegundos++; localStorage.setItem('afp_simulado_time', totalSegundos); displayTime(); }, 1000); document.getElementById('btn-timer-control').innerText = "Pausar"; } else { document.getElementById('btn-timer-control').innerText = "Iniciar"; } }
    function toggleTimer() { isTimerRunning = !isTimerRunning; localStorage.setItem('afp_simulado_running', isTimerRunning); handleTimerState(); applyVisualPauseState(); }
    function applyVisualPauseState() { document.querySelectorAll('.quest-card').forEach(card => { const id = card.id.replace('quest-', ''); if (!userProgress[id]) card.classList.toggle('paused-mode', !isTimerRunning); }); }
    function displayTime() { let h = Math.floor(totalSegundos/3600), m = Math.floor((totalSegundos%3600)/60), s = totalSegundos%60; document.getElementById('dash-timer').innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`; }
    function resetSimulado() { if (confirm("Zerar tudo?")) { localStorage.clear(); location.reload(); } }
    if(questions.length > 0) { displayTime(); handleTimerState(); renderQuiz(); } else { container.innerHTML = "<p style='padding:20px; text-align:center;'>Nenhuma questão encontrada. Verifique o arquivo dados.js.</p>"; }
</script>
</body>
</html>
